<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NollyDevelop | Professional No-Code Engine</title>
    <!-- Подключаем иконки FontAwesome для красоты -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- Подключаем стили -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-wrapper">
        <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
        <header class="top-bar">
            <div class="logo">
                <i class="fas fa-code-branch"></i> NOLLY<span>DEVELOP</span>
            </div>
            <div class="top-actions">
                <button id="clear-canvas" class="btn-secondary">
                    <i class="fas fa-eraser"></i> Сброс
                </button>
                <button id="export-btn" class="btn-primary">
                    <i class="fas fa-rocket"></i> Скачать готовый сайт
                </button>
            </div>
        </header>

        <div class="main-content">
            <!-- ЛЕВАЯ ПАНЕЛЬ: ВЫБОР БЛОКОВ -->
            <aside class="sidebar side-left">
                <div class="panel-header">Компоненты</div>
                <div class="widget-list">
                    <div class="widget-item" draggable="true" data-type="h1">
                        <i class="fas fa-heading"></i>
                        <span>Заголовок H1</span>
                    </div>
                    <div class="widget-item" draggable="true" data-type="p">
                        <i class="fas fa-paragraph"></i>
                        <span>Текст</span>
                    </div>
                    <div class="widget-item" draggable="true" data-type="button">
                        <i class="fas fa-hand-pointer"></i>
                        <span>Кнопка</span>
                    </div>
                    <div class="widget-item" draggable="true" data-type="image">
                        <i class="fas fa-image"></i>
                        <span>Картинка</span>
                    </div>
                    <div class="widget-item" draggable="true" data-type="divider">
                        <i class="fas fa-grip-lines"></i>
                        <span>Линия</span>
                    </div>
                </div>
                <div class="sidebar-footer">
                    <p>Перетаскивайте блоки на холст справа →</p>
                </div>
            </aside>

            <!-- ЦЕНТР: ХОЛСТ (ГДЕ СТРОИМ САЙТ) -->
            <main class="canvas-container">
                <div id="canvas" class="canvas">
                    <div class="canvas-placeholder">
                        <i class="fas fa-plus-circle"></i>
                        <p>Ваш будущий сайт начинается здесь</p>
                    </div>
                </div>
            </main>

            <!-- ПРАВАЯ ПАНЕЛЬ: РЕДАКТИРОВАНИЕ -->
            <aside class="sidebar side-right" id="inspector">
                <div class="panel-header">Свойства элемента</div>
                
                <div id="no-selection-msg" class="empty-msg">
                    <i class="fas fa-mouse-pointer"></i>
                    <p>Кликните на элемент на холсте, чтобы изменить его</p>
                </div>
                
                <div id="editor-controls" class="editor-controls" style="display: none;">
                    <div class="control-group">
                        <label>Содержимое (текст)</label>
                        <textarea id="prop-text" rows="4"></textarea>
                    </div>

                    <div class="control-group">
                        <label>Цвет текста</label>
                        <input type="color" id="prop-color">
                    </div>

                    <div class="control-group">
                        <label>Размер шрифта (px)</label>
                        <input type="number" id="prop-size" min="12" max="120">
                    </div>

                    <div class="control-group">
                        <label>Выравнивание</label>
                        <div class="align-buttons">
                            <button class="align-btn" data-align="left"><i class="fas fa-align-left"></i></button>
                            <button class="align-btn" data-align="center"><i class="fas fa-align-center"></i></button>
                            <button class="align-btn" data-align="right"><i class="fas fa-align-right"></i></button>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Отступ сверху (px)</label>
                        <input type="range" id="prop-margin" min="0" max="150" value="0">
                        <span id="margin-val">0px</span>
                    </div>

                    <div class="divider-mini"></div>

                    <button id="delete-element" class="btn-danger">
                        <i class="fas fa-trash"></i> Удалить блок
                    </button>
                </div>
            </aside>
        </div>
    </div>

    <!-- Подключаем скрипт в самом конце -->
    <script src="script.js"></script>
</body>
</html>
